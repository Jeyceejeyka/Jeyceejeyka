<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0e14"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="titleFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a9c4ff"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- floating glass blobs (the "light source" behind the glass) -->
  <circle cx="180" cy="90" r="220" fill="url(#blob1)" filter="url(#blur1)"/>
  <circle cx="1040" cy="340" r="240" fill="url(#blob2)" filter="url(#blur1)"/>
  <circle cx="620" cy="60" r="160" fill="url(#blob3)" filter="url(#blur2)"/>

  <!-- subtle grid texture -->
  <g stroke="#ffffff" stroke-opacity="0.035" stroke-width="1">
    <path d="M0 70 H1200 M0 140 H1200 M0 210 H1200 M0 280 H1200 M0 350 H1200"/>
    <path d="M150 0 V420 M350 0 V420 M550 0 V420 M750 0 V420 M950 0 V420 M1150 0 V420"/>
  </g>

  <!-- glass panel -->
  <rect x="90" y="70" width="1020" height="280" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.2"/>
  <rect x="90" y="70" width="1020" height="1" fill="#ffffff" fill-opacity="0.25"/>

  <!-- accent dot -->
  <circle cx="140" cy="130" r="6" fill="#3fb950"/>
  <text x="158" y="136" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#8b949e" letter-spacing="2">AVAILABLE FOR WORK</text>

  <!-- title -->
  <text x="140" y="225" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="url(#titleFade)">Jaafar</text>
  <text x="140" y="270" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" fill="#c9d1d9" font-weight="500">Full-Stack Software Engineer</text>
  <text x="140" y="305" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#8b949e">React · TypeScript · Django REST Framework · Docker</text>

  <!-- pill tags -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#c9d1d9">
    <rect x="140" y="320" width="88" height="30" rx="15" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.15"/>
    <text x="160" y="340">React</text>

    <rect x="238" y="320" width="80" height="30" rx="15" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.15"/>
    <text x="256" y="340">Django</text>

    <rect x="328" y="320" width="82" height="30" rx="15" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.15"/>
    <text x="346" y="340">Docker</text>

    <rect x="420" y="320" width="118" height="30" rx="15" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.15"/>
    <text x="438" y="340">East Africa 🌍</text>
  </g>
</svg>
